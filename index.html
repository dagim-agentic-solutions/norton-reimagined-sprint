<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Norton Reimagined Sprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #F8F8F7;
      --text:    #242424;
      --yellow:  #FFE800;
      --mid:     #6B6B6B;
      --border:  #E0E0DE;
    }

    body {
      font-family: "Inter Tight", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--text);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 2px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 640px;
      text-align: center;
      margin-bottom: 1.25rem;
    }

    h1 span {
      color: var(--mid);
    }

    p.sub {
      font-size: 1rem;
      font-weight: 400;
      color: var(--mid);
      text-align: center;
      max-width: 480px;
      line-height: 1.6;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: var(--yellow);
      margin: 2.5rem auto;
      border-radius: 2px;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: var(--border);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <span class="badge">Design Sprint · Internal Only</span>

  <h1>Norton Reimagined<br/><span>— coming soon —</span></h1>

  <div class="divider"></div>

  <p class="sub">
    Laura cheat sheet &amp; concept pressure-tester loading shortly.<br/>
    Reach out to the sprint lead if you need early access.
  </p>

  <footer>norton-reimagined-sprint · simplfinance.ai</footer>

</body>
</html>
